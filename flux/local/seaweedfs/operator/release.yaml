---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seaweedfs-operator
  namespace: seaweedfs
spec:
  interval: 10m
  chart:
    spec:
      chart: seaweedfs-operator
      # Exact pin; bumped by Renovate (flux manager).
      version: "0.1.35"
      sourceRef:
        kind: HelmRepository
        name: seaweedfs-operator
        namespace: seaweedfs
      interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Disable the admission webhook: the chart self-signs its serving cert via
    # kube-webhook-certgen, which leaves the webhook's caBundle untrusted here and
    # blocks the Seaweed CR ("x509: signed by unknown authority"). This is a
    # disposable local test store, so we don't need admission defaulting/validation
    # — the operator's controller still reconciles the Seaweed cluster.
    webhook:
      enabled: false
