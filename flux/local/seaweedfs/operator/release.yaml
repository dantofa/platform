---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seaweedfs-operator
  namespace: seaweedfs
spec:
  interval: 10m
  chart:
    spec:
      chart: seaweedfs-operator
      # Local test store; pin deliberately via `just update`.
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: seaweedfs-operator
        namespace: seaweedfs
      interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
