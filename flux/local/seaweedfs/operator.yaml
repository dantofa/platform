---
# Installs the SeaweedFS operator (and its CRDs) from its Helm chart into the
# seaweedfs namespace.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seaweedfs-operator
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/local/seaweedfs/operator
  prune: true
  sourceRef:
    kind: OCIRepository
    name: platform
