---
# The SeaweedFS cluster (in the velero namespace) + bucket + S3 identity. Depends
# on the operator so the seaweed.seaweedfs.com CRDs exist before these custom
# resources are applied. The velero namespace is created imperatively by
# `dctl local cluster bootstrap` (like the DOKS CLI does), so no local stack
# declares it and the reused flux/cluster/velero stack stays its sole Flux owner.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: seaweedfs-cluster
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/local/seaweedfs/cluster
  prune: true
  dependsOn:
    - name: seaweedfs-operator
  sourceRef:
    kind: OCIRepository
    name: platform
