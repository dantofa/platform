---
# Velero credential (key `cloud`) matching the SeaweedFS S3 identity in
# ../seaweedfs/cluster/s3-config.yaml. The same object dctl writes on DOKS; here
# it is static (local test store). Keep the keys in sync with the S3 identity.
apiVersion: v1
kind: Secret
metadata:
  name: backup-credential
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=localbackup
    aws_secret_access_key=localbackupsecret
