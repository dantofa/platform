---
# Reuses the shared Velero stack (./flux/cluster/velero) on the local cluster,
# substituting the SeaweedFS coordinates. Depends on the backup stack so the
# backup-target ConfigMap and backup-credential Secret exist first. The source is
# the OCIRepository `dctl local cluster bootstrap` registers in flux-system,
# hence the cross-namespace sourceRef and dependsOn.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m
  path: ./flux/cluster/velero
  prune: true
  dependsOn:
    - name: backup
      namespace: flux-system
  sourceRef:
    kind: OCIRepository
    name: platform
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: backup-target
