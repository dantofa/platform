---
# The Cloudflare API token for cert-manager's DNS-01 solver, materialized into
# the cert-manager namespace via the ESO `bitwarden` ClusterSecretStore. A
# ClusterIssuer reads its solver secrets from cert-manager's
# --cluster-resource-namespace (the cert-manager namespace), so the token must
# live there. Same bws secret external-dns uses; Zone.DNS:Edit + Zone:Read.
#
# ACTION REQUIRED: CLOUDFLARE_API_TOKEN is the bws secret NAME (its value is the
# token) — not the token itself.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: CLOUDFLARE_API_TOKEN
