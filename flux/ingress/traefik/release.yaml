---
# Traefik, the DOKS ingress controller (the local-cluster analogue is the
# Cloudflare Tunnel controller). It is the default IngressClass, so the same
# vanilla Ingress objects route on both cluster types. Exposed via a DO
# LoadBalancer; Cloudflare proxies it (Full strict), so:
#   - websecure (443) is the default entrypoint with entrypoint-level TLS, and
#     tlsStore.default serves the cert-manager-issued default cert
#     (traefik-default-tls, see certificate.yaml) — so portable Ingresses need no
#     `tls:` block;
#   - web (80) permanently redirects to websecure;
#   - publishedService lets external-dns read the LB address off Ingress status.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      # Exact pin; bumped by Renovate (flux manager).
      version: "41.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
    service:
      type: LoadBalancer
      # Lock the DO LoadBalancer to Cloudflare's IPv4 ranges so the origin can't
      # be reached directly (bypassing Cloudflare's proxy/WAF). DO provisions an
      # LB firewall from loadBalancerSourceRanges. IPv4-only: the LB is v4, so
      # Cloudflare reaches it over v4. The list is regenerated from
      # cloudflare.com/ips-v4 by `just cloudflare-acl`; the cloudflare
      # workflow opens a PR when it changes.
      loadBalancerSourceRanges:
        # BEGIN cloudflare-ipv4 (generated by `just cloudflare-acl`; do not edit)
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 108.162.192.0/18
        - 131.0.72.0/22
        - 141.101.64.0/18
        - 162.158.0.0/15
        - 172.64.0.0/13
        - 173.245.48.0/20
        - 188.114.96.0/20
        - 190.93.240.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        # END cloudflare-ipv4
    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        asDefault: true
    tlsStore:
      default:
        defaultCertificate:
          secretName: traefik-default-tls
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 256Mi
