---
# The Cloudflare Origin CA wildcard cert (*.dantofa.dev + dantofa.dev) Traefik
# serves as its default certificate, so Cloudflare Full (strict) trusts the
# origin. Long-lived (issue once in Cloudflare, store cert+key in bws); ESO syncs
# it into a kubernetes.io/tls secret via the target template.
#
# ACTION REQUIRED: CLOUDFLARE_ORIGIN_CA_CERT / _KEY are the bws secret NAMES whose
# values are the PEM cert and private key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: traefik-default-tls
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: traefik-default-tls
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .origin_cert }}"
        tls.key: "{{ .origin_key }}"
  data:
    - secretKey: origin_cert
      remoteRef:
        key: CLOUDFLARE_ORIGIN_CA_CERT
    - secretKey: origin_key
      remoteRef:
        key: CLOUDFLARE_ORIGIN_CA_KEY
