---
# The Cloudflare API token for external-dns, materialized from bws via the ESO
# `bitwarden` ClusterSecretStore. Only Zone.DNS:Edit is required.
#
# ACTION REQUIRED: CLOUDFLARE_API_TOKEN is the bws secret NAME (its value is the
# token) — not the token itself.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden
  target:
    name: cloudflare-api
  data:
    - secretKey: api_token
      remoteRef:
        key: CLOUDFLARE_API_TOKEN
