---
# Deploys the echo test backend (./flux/echo). Reusable on any cluster type; on
# kind, `dctl local cluster bootstrap` applies an equivalent `echo` reconcile root
# by default. Portable via the default IngressClass; the Ingress host resolves
# from ${base_domain} in cluster-vars. dependsOn ingress so the controller and its
# default IngressClass exist before the Ingress is created.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: echo
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/echo
  prune: true
  wait: true
  dependsOn:
    - name: ingress
  sourceRef:
    kind: ${source_kind}
    name: ${source_name}
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
