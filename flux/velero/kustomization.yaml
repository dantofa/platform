---
# Reconciled by the `velero` Kustomization (../velero.yaml) with
# postBuild.substituteFrom, so the ${bucket}/${region}/${endpoint} placeholders
# in helmrelease.yaml are filled from the coordinates ConfigMap.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - helmrelease.yaml
