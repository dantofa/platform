kind: HelmRelease
metadata:
  name: cloudnativepg
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: cloudnativepg
        namespace: flux-system
      interval: 1h
  targetNamespace: cloudnativepg-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
