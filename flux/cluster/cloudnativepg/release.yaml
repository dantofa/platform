---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnativepg
  namespace: cloudnativepg-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cloudnative-pg
      # Exact pin; bumped by Renovate (flux manager).
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnativepg
        namespace: cloudnativepg-system
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
