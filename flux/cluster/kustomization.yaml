---
# The shared, source-agnostic stacks every cluster loads, reconciled by the
# `cluster` reconcile root that `dctl {do,local} cluster bootstrap` applies
# (path: ./flux/cluster). Each nested Kustomization's sourceRef uses
# ${source_kind}/${source_name}, filled by the root's postBuild.substitute per
# how the cluster was bootstrapped (GitRepository for DOKS/git, OCIRepository for
# local). Add a shared stack by appending one file here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cert-manager.yaml
  - cert-manager-config.yaml
  - eso.yaml
  - eso-config.yaml
  - velero.yaml
  - kyverno.yaml
