---
# The CloudNativePG operator, a shared stack the `cluster` reconcile root loads on
# every cluster type: it manages PostgreSQL clusters (the operator only; Postgres
# Cluster CRs are declared separately). Like the other shared stacks its sourceRef
# is source-agnostic — the ${source_kind}/${source_name} placeholders are filled
# by the root's postBuild.substituteFrom the cluster-vars ConfigMap.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnativepg
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/cluster/cloudnativepg
  prune: true
  sourceRef:
    kind: ${source_kind}
    name: ${source_name}
    namespace: flux-system
