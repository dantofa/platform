---
# Velero, backing the whole cluster up to the linked object-storage bucket.
# The ${bucket}/${region}/${endpoint} placeholders are substituted by the parent
# `velero` Kustomization from the backup-target ConfigMap. Credentials come from
# the backup-credential Secret (key `cloud`) that dctl writes into this
# namespace; the provider API token never enters the cluster.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m
  chart:
    spec:
      chart: velero
      # Exact pin; bumped by Renovate (flux manager).
      version: "12.1.0"
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: velero
      interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # The AWS provider plugin speaks the S3 API that Spaces implements.
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.13.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    credentials:
      existingSecret: backup-credential
    # Spaces is object storage only: no volume snapshots, no node agent.
    snapshotsEnabled: false
    deployNodeAgent: false
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${bucket}
          default: true
          config:
            region: ${region}
            s3Url: ${endpoint}
            s3ForcePathStyle: "true"
    schedules:
      daily:
        disabled: false
        schedule: "0 1 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: "720h"
          includedNamespaces:
            - "*"
