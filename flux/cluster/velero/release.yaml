---
# Velero, backing the whole cluster up to the linked object-storage bucket.
# The ${bucket}/${region}/${endpoint} placeholders are substituted by the parent
# `velero` Kustomization from the backup-target ConfigMap. Credentials come from
# the backup-credential Secret (key `cloud`) that dctl writes into this
# namespace; the provider API token never enters the cluster.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m
  chart:
    spec:
      chart: velero
      # Exact pin; bumped by Renovate (flux manager).
      version: "12.1.0"
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: velero
      interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # The AWS provider plugin speaks the S3 API that Spaces implements.
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.13.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    credentials:
      existingSecret: backup-credential
    # No CSI volume snapshots (Spaces is object storage). Instead the node-agent
    # backs up volume DATA via file-system backup into the same Spaces bucket --
    # self-contained, portable DR that protects any volume a downstream cluster
    # provisions, and reuses the node-agent a later CSI snapshot-data-movement
    # upgrade would build on. Operator-owned volumes (e.g. CloudNativePG) must opt
    # OUT of fsBackup via a `backup.velero.io/backup-volumes-excludes` pod
    # annotation (or `velero.io/exclude-from-backup` on the PVC), set in the
    # operator's CR -- they own their own volume backups.
    snapshotsEnabled: false
    deployNodeAgent: true
    nodeAgent:
      # Bound the DaemonSet's footprint (it runs on every node).
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    configuration:
      # Opt-out model: every pod volume is fs-backed-up unless annotated to skip
      # (see above). Without this, fsBackup would need a per-pod opt-in annotation.
      defaultVolumesToFsBackup: true
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${bucket}
          default: true
          config:
            region: ${region}
            s3Url: ${endpoint}
            s3ForcePathStyle: "true"
    schedules:
      daily:
        disabled: false
        schedule: "0 1 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: "720h"
          includedNamespaces:
            - "*"
