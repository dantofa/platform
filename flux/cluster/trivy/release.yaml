---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  interval: 10m
  chart:
    spec:
      chart: trivy-operator
      # Exact pin; bumped by Renovate (flux manager).
      version: "0.34.0"
      sourceRef:
        kind: HelmRepository
        name: trivy-operator
        namespace: trivy-system
      interval: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    operator:
      vulnerabilityScannerEnabled: true
      configAuditScannerEnabled: false
      rbacAssessmentScannerEnabled: false
      # Daily rescan at midnight catches new CVEs on images that have not been redeployed.
      scanJobSchedule: "0 0 * * *"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
