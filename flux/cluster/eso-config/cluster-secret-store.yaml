---
# The cluster-wide Bitwarden Secrets Manager store. Talks to the in-cluster
# bitwarden-sdk-server over TLS (trusting its cert via caProvider). organizationID
# and projectID come from cluster-vars (dctl writes them from $BWS_ORGANIZATION_ID
# / $BWS_PROJECT_ID); the machine-account token is secret-zero
# (bitwarden-access-token), planted by dctl from $BWS_ACCESS_TOKEN. Downstream
# ExternalSecrets reference this store to materialize secrets from bws.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets-system.svc.cluster.local:9998
      organizationID: ${bitwarden_org_id}
      projectID: ${bitwarden_project_id}
      caProvider:
        type: Secret
        name: bitwarden-tls-certs
        namespace: external-secrets-system
        key: ca.crt
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token
            key: token
            namespace: external-secrets-system
