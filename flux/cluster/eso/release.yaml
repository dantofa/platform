---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets-system
spec:
  interval: 10m
  chart:
    spec:
      chart: external-secrets
      # Exact pin; bumped by Renovate (flux manager).
      version: "2.7.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets-system
      interval: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    installCRDs: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    # The Bitwarden Secrets Manager provider needs this sidecar server. Its TLS is
    # on by default and reads the `bitwarden-tls-certs` secret (see
    # certificate.yaml, issued by cert-manager's self-signed ClusterIssuer).
    bitwarden-sdk-server:
      enabled: true
