---
# The Kyverno policy engine, a shared stack the `cluster` reconcile root loads on
# every cluster type. Like velero.yaml its sourceRef is source-agnostic: the
# ${source_kind}/${source_name} placeholders are filled by the root's
# postBuild.substituteFrom the cluster-vars ConfigMap.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/cluster/kyverno
  prune: true
  sourceRef:
    kind: ${source_kind}
    name: ${source_name}
    namespace: flux-system
