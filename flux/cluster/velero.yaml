---
# The Velero backup stack, one of the shared stacks the `cluster` reconcile root
# loads on every cluster type. sourceRef is source-agnostic: the ${source_kind}/
# ${source_name} placeholders are filled by the root's postBuild.substitute
# (GitRepository/OCIRepository per how the cluster was bootstrapped). Its own
# substituteFrom binds the SeaweedFS/Spaces coordinates from the backup-target
# ConfigMap, which the root ordering guarantees exists first (local: the
# local-requirements root; DOKS: `dctl do cluster bootstrap`).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m
  path: ./flux/cluster/velero
  prune: true
  sourceRef:
    kind: ${source_kind}
    name: ${source_name}
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: backup-target
