---
# Nested Kustomization that reconciles ./flux/cluster/velero WITH the
# cluster-specific backup coordinates substituted in. substituteFrom reads the
# ConfigMap that `dctl do cluster bootstrap` / `dctl do space link` writes into
# this namespace (keys: bucket, region, endpoint), so the same manifests target
# whichever bucket a cluster was linked to. The source lives in flux-system
# (registered by bootstrap), hence the cross-namespace sourceRef.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m
  path: ./flux/cluster/velero
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform
    namespace: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: backup-target
