[project]
name = "dantofa-cli"
dynamic = ["version"]
description = "Daantofa cli utility"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["typer>=0.16.0"]

[project.scripts]
dctl = "dantofa.cli.main:run"
"dantofa.cli" = "dantofa.cli.main:run"

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# Version is derived from git tags (e.g. `v0.1.0` -> `0.1.0`); never edited by
# hand. See CLAUDE.md.
[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src/dantofa"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
  "pre-commit>=4.6.0",
  "pytest>=9.1.1",
  "ruff>=0.15.18",
  "skylos>=4.25.0",
  "ty>=0.0.51",
]
