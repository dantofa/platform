---
name: local
on:
  pull_request:
permissions: {}
env:
  FORCE_COLOR: ""
  NO_COLOR: "1"
  KUBECONFIG: .kubeconfig
jobs:
  local:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'go.sum', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Create local cluster
        run: nix run .#default -- local cluster create

      - name: Verify provisioning
        run: |
          nix run .#default -- local cluster list | grep -q '"local"'
          nix run .#default -- local cluster connect
          nix develop --command kubectl wait --for=condition=Ready nodes --all --timeout=180s
          count=$(nix develop --command kubectl get nodes -o name | wc -l)
          test "$count" -eq 4
          curl -fsS http://localhost:5001/v2/ > /dev/null

      # bootstrap is self-contained: it publishes the flux/ tree, installs Flux,
      # and wires the OCIRepository/Kustomization (a separate `push` is only for
      # iterating on edits afterwards).
      - name: Bootstrap the backup stack
        run: nix run .#default -- local cluster bootstrap

      # Gate on the whole GitOps tree reconciling (generous timeout for cold
      # image pulls) before checking the backup itself.
      - name: Verify Kustomizations reconciled
        run: nix run .#default -- flux kustomization verify --wait --timeout 600s --kubeconfig .kubeconfig

      - name: Verify Velero backup
        run: nix develop --command just verify-backup

      - name: Delete local cluster
        if: always()
        run: nix run .#default -- local cluster delete
