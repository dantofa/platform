---
name: release
on:
  push:
    tags:
      - "v*"
permissions: {}
env:
  FORCE_COLOR: ""
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required for `gh release create`.
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # Required so hatch-vcs can derive the version.
          persist-credentials: false

      - name: Verify tag points at a master commit
        run: |
          git fetch --no-tags origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::Tag $GITHUB_REF_NAME is not reachable from master;" \
                 "release tags must point at a merged (gated) commit."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
