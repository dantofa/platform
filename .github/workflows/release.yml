---
name: release
on:
  push:
    tags:
      - 'v*'
permissions: {}
env:
  # Force plain output in CI logs; rich/Typer otherwise colorizes (e.g. under
  # devbox's pseudo-terminal), which is noise when troubleshooting. FORCE_COLOR
  # must be empty — any non-empty value, including "0", still forces color.
  FORCE_COLOR: ""
  NO_COLOR: "1"
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Granted only on this job, which needs it for `gh release create`.
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          # Full history + tags so release notes can diff against the previous tag.
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag points at a master commit
        run: |
          git fetch --no-tags origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::Tag $GITHUB_REF_NAME is not reachable from master;" \
                 "release tags must point at a merged (gated) commit."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
