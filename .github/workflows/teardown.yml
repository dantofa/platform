---
name: teardown
on:
  pull_request:
    types: [closed]
permissions: {}
env:
  FORCE_COLOR: ""
  NO_COLOR: "1"
  CLUSTER_NAME: saas-preview-${{ github.event.pull_request.number }}
jobs:
  teardown:
    runs-on: ubuntu-latest
    # 30m (not 10m): this is a paid-cluster safety net, so a cold cache miss on the
    # `nix run` build must not time out and leave a cluster billing.
    timeout-minutes: 30
    environment: preview
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # ratchet:DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # ratchet:nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'go.sum', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # bws comes from the flake dev shell (the same pinned nixpkgs as the
      # package; the shell's allowUnfree predicate covers bws). It injects the
      # DigitalOcean token, then runs the shipped dctl (the flake artifact via
      # `nix run .#default`, not `uv run`) to guarantee teardown.
      - name: Destroy preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          nix develop --command
          bws run --project-id ${{ vars.BWS_PROJECT_ID }} --
          nix run .#default -- digitalocean cluster delete "$CLUSTER_NAME"
