---
name: teardown
# Safety net: guarantee the per-PR preview cluster is gone once the PR is closed
# or merged (the preview workflow only tears down on success, so a failed run can
# leave a cluster behind). `closed` fires for both merge and plain close.
on:
  pull_request:
    types: [closed]
permissions: {}
env:
  FORCE_COLOR: ""
  NO_COLOR: "1"
  CLUSTER_NAME: saas-preview-${{ github.event.pull_request.number }}
jobs:
  teardown:
    runs-on: ubuntu-latest
    # 30m (not 10m): this is a paid-cluster safety net, so a cold cache miss on the
    # `nix run` build must not time out and leave a cluster billing.
    timeout-minutes: 30
    environment: preview
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@cd46bde16ab981b0a7b2dce0574509104543276e # ratchet:DeterminateSystems/nix-installer-action@v9

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@d8cff2f74b9341e0d90fbf3c0c0212a161ceaef6 # ratchet:nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'uv.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # bws (from nixpkgs, orthogonal to the package) injects the DigitalOcean
      # token, then runs the shipped dctl to guarantee teardown.
      - name: Destroy preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          nix shell nixpkgs#bws --command
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster delete "$CLUSTER_NAME"
