---
name: preview
on:
  pull_request:
permissions: {}
env:
  FORCE_COLOR: ""
  CLUSTER_NAME: saas-preview-${{ github.event.pull_request.number }}
jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: preview
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # ratchet:DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # ratchet:nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'uv.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # ratchet:jetify-com/devbox-install-action@v0.15.0
        with:
          skip-nix-installation: true

      - name: Destroy preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          devbox run --
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster delete "$CLUSTER_NAME"

      - name: Create preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          devbox run --
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster create --name "$CLUSTER_NAME" --wait

      # TODO: payload testing goes here, between create and teardown:
      #   - wait for the cluster to reach "running" and fetch its kubeconfig
      #   - deploy the payload
      #   - run the cluster tests against it

      - name: Destroy preview cluster
        if: success()
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          devbox run --
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster delete "$CLUSTER_NAME"
