---
name: preview
on:
  push:
    branches: [main, master]
  pull_request:
permissions: {}
env:
  FORCE_COLOR: ""
  CLUSTER_NAME: "saas-preview-"
  CLUSTER_REGION: "nyc3"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # ratchet:jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Create preview cluster
        run: devbox run -- dctl digitalocean cluster create --name
