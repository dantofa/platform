---
name: preview
on:
  pull_request:
permissions: {}
env:
  FORCE_COLOR: ""
  CLUSTER_NAME: saas-preview-${{ github.event.pull_request.number }}
jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: preview
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@cd46bde16ab981b0a7b2dce0574509104543276e # ratchet:DeterminateSystems/nix-installer-action@v9

      # Cache the uv2nix-built closure so `nix run` doesn't cold-build every time
      # (see nix.yml for the binary-cache upgrade TODO).
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@135667ec418502fa5a3598af6fb9eb733888ce6a # ratchet:nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'uv.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Destroy preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          nix shell nixpkgs#bws --command
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster delete "$CLUSTER_NAME"

      - name: Create preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          nix shell nixpkgs#bws --command
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster create --name "$CLUSTER_NAME" --wait

      # TODO: payload testing goes here, between create and teardown:
      #   - wait for the cluster to reach "running" and fetch its kubeconfig
      #   - deploy the payload
      #   - run the cluster tests against it

      - name: Destroy preview cluster
        if: success()
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: >-
          nix shell nixpkgs#bws --command
          bws run --project-id 8adeb984-2d51-4701-bd80-b3a3018260ea --
          nix run .#default -- digitalocean cluster delete "$CLUSTER_NAME"
