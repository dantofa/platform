---
name: lint
on:
  push:
    branches: [main, master]
  pull_request:
permissions: {}
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5
        with:
          # Full history + tags so hatch-vcs can derive the version.
          fetch-depth: 0
          persist-credentials: false

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # ratchet:jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: devbox run -- uv sync --locked

      - name: Lint
        run: devbox run -- just lint
