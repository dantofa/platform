---
name: lint
on:
  pull_request:
permissions: {}
env:
  FORCE_COLOR: ""
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # ratchet:DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # ratchet:nix-community/cache-nix-action@v7
        with:
          primary-key: nix-devshell-${{ runner.os }}-${{ hashFiles('flake.lock', 'go.sum', '**/*.nix') }}
          restore-prefixes-first-match: nix-devshell-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-devshell-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Go module + build caches live in $HOME, not the nix store, so cache them
      # separately from the nix closure above.
      - name: Cache Go modules and build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Lint
        run: nix develop --command just lint
