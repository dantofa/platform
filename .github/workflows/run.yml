---
name: run
on:
  push:
    branches: [main, master]
  pull_request:
permissions: {}
env:
  FORCE_COLOR: ""
jobs:
  uvx:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # ratchet:astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Run via uvx from GitHub PR head
        env:
          REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          REF: ${{ github.head_ref || github.ref_name }}
        run: uvx --refresh --from "git+https://github.com/${REPO}.git@${REF}" dantofa.cli --version
