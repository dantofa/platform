---
name: nix
on:
  push:
    branches: [main, master]
  pull_request:
permissions: {}
jobs:
  flake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # ratchet:DeterminateSystems/nix-installer-action@v22

      # The Go build closure + wrapper aren't in cache.nixos.org (they're built
      # from our go.sum), so cache the store in the GitHub Actions cache to avoid a
      # cold rebuild on every run.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # ratchet:nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'go.sum', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Flake check
        run: nix flake check --no-update-lock-file --print-build-logs

      # The version is stamped into the binary from the flake source (commit date +
      # short rev) via `-ldflags -X …/internal/version.Version`. If that injection
      # ever breaks, the build falls back to the bare "dev" default. Assert the
      # version is actually stamped so `dctl --version` keeps naming the commit it
      # was built from.
      - name: Verify version is stamped
        run: |
          version="$(nix run .#default -- --version)"
          echo "dctl --version -> $version"
          case "$version" in
            0.0.0.dev*+g*) echo "version stamped from flake source" ;;
            *) echo "::error::version not stamped (got '$version', expected 0.0.0.dev<date>+g<rev>)"; exit 1 ;;
          esac
