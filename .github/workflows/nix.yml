---
name: nix
on:
  push:
    branches: [main, master]
  pull_request:
permissions: {}
jobs:
  flake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@cd46bde16ab981b0a7b2dce0574509104543276e # ratchet:DeterminateSystems/nix-installer-action@v9

      # The uv2nix-built Python closure + wheel + wrapper aren't in cache.nixos.org
      # (they're built from our uv.lock), so cache them in the GitHub Actions cache
      # to avoid a cold rebuild on every run.
      # TODO: the GH Actions cache is 10 GB and LRU-evicted; if it proves too small
      # or flaky for the closure, evaluate a dedicated binary cache — FlakeHub Cache
      # (OIDC, installer-native) or Cachix (public repos get a 5 GB free tier).
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@135667ec418502fa5a3598af6fb9eb733888ce6a # ratchet:nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'uv.lock', '**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Flake check
        run: nix flake check --no-update-lock-file --print-build-logs
