---
name: destroy
# Safety net: guarantee the per-PR preview cluster is gone once the PR is closed
# or merged (the preview workflow only tears down on success, so a failed run can
# leave a cluster behind). `closed` fires for both merge and plain close.
on:
  pull_request:
    types: [closed]
permissions: {}
env:
  FORCE_COLOR: ""
  NO_COLOR: "1"
  CLUSTER_NAME: saas-preview-${{ github.event.pull_request.number }}
jobs:
  teardown:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: preview
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # ratchet:jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Destroy preview cluster
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: devbox run -- dctl digitalocean cluster delete "$CLUSTER_NAME"
