---
version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (opens PRs that bump the pinned
  # commit and version comment). Complements `just update` (manual ratchet run).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  # Go module updates. Complements `just update` (manual `go get -u` run). Note a
  # go.sum change requires recomputing the flake's vendorHash.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
